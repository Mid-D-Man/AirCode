<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <!-- More permissive CSP for debugging -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' 'unsafe-eval' https://unpkg.com https://*.supabase.co data: blob:; connect-src 'self' https://*.supabase.co;">
    <title>AirCode</title>
    <base href="/AirCode/" />
    <!-- Add a fallback stylesheet first -->
    <style>
        /* Minimal fallback styles before app.css loads */
        body { font-family: system-ui, sans-serif; margin: 0; padding: 0; }
        #blazor-error-ui { display: none; }
        .loading-progress {
            width: 64px; height: 64px; margin: 100px auto;
            border: 6px solid #e0e0e0; border-radius: 50%;
            border-top-color: #3498db; animation: spin 1s infinite linear;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .splash-screen {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background-color: #f5f5f5; z-index: 9999;
            transition: opacity 0.3s ease-in-out;
        }
        .splash-screen img { max-width: 150px; margin-bottom: 20px; }
        .splash-screen h1 { font-size: 24px; margin: 0 0 20px 0; }
        .splash-screen p { margin: 0; }
    </style>
    <!-- App stylesheets with integrity checks removed for debugging -->
    <link href="css/bootstrap/bootstrap.min.css" rel="stylesheet" />
    <link href="css/app.css" rel="stylesheet" />
    <link href="css/colors.css" rel="stylesheet" />
    <link href="css/responsive.css" rel="stylesheet" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="manifest.json" rel="manifest" />
    <link rel="apple-touch-icon" sizes="512x512" href="icon-512.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="icon-192.png" />
</head>

<body>
<!-- Custom splash screen that doesn't rely on Blazor -->
<div id="custom-splash" class="splash-screen">
    <img src="favicon.png" alt="AirCode Logo" />
    <h1>AirCode</h1>
    <p>Loading application...</p>
    <div class="loading-progress"></div>
</div>

<div id="app">
    <!-- This will be replaced by Blazor -->
</div>

<div id="blazor-error-ui" style="display: none;">
    An unhandled error has occurred.
    <a href="" class="reload">Reload</a>
    <a class="dismiss">🗙</a>
</div>

<!-- Load debug script first -->
<script src="js/debug.js"></script>

<!-- Polyfill for older browsers if needed -->
<script>
    if (!('Promise' in window)) {
        document.write('<script src="https://unpkg.com/es6-promise@4.2.8/dist/es6-promise.auto.min.js"><\/script>');
    }
</script>

<!-- Load Blazor with error handling -->
<script>
    // Create a timeout to show an error if Blazor doesn't load
    let blazorLoadTimeout = setTimeout(function() {
        document.getElementById('blazor-error-ui').style.display = 'block';
        document.getElementById('blazor-error-ui').innerHTML =
            'Failed to load the Blazor WebAssembly application. ' +
            'This could be due to network issues or an incorrect base path. ' +
            '<a href="javascript:location.reload()">Try reloading</a> or ' +
            '<a href="/AirCode/">return to home</a>.';
    }, 15000); // 15 seconds timeout

    // Function to hide custom splash screen when Blazor is ready
    window.hideSplashScreen = function() {
        clearTimeout(blazorLoadTimeout);
        let splash = document.getElementById('custom-splash');
        if (splash) {
            splash.style.opacity = '0';
            setTimeout(function() {
                splash.style.display = 'none';
            }, 300);
        }
    };
</script>

<!-- Load Blazor -->
<script src="_framework/blazor.webassembly.js" onerror="document.getElementById('blazor-error-ui').style.display = 'block'"></script>

<!-- External libraries -->
<script src="https://unpkg.com/@zxing/library@0.18.6/umd/index.min.js"></script>

<!-- App scripts -->
<script src="js/connectivityServices.js"></script>
<script src="js/themeSwitcher.js"></script>

<!-- Service worker registration -->
<script>
    // Register service worker when page has loaded
    window.addEventListener('load', function() {
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('service-worker.js')
                .then(function(registration) {
                    console.log('ServiceWorker registration successful with scope: ', registration.scope);
                })
                .catch(function(error) {
                    console.log('ServiceWorker registration failed: ', error);
                });
        }

        // Hide splash screen when Blazor is ready or after a timeout
        if (window.Blazor) {
            window.Blazor.addEventListener('afterStarted', hideSplashScreen);
        } else {
            setTimeout(hideSplashScreen, 10000); // Fallback timeout
        }
    });
</script>
</body>
</html>
