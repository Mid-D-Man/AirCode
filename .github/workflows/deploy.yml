name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: 7.0.x

      - name: Publish
        run: dotnet publish AirCode.csproj -c Release -o release --nologo

      # Add the CNAME file to the build output if you have a custom domain
      # - name: Add CNAME file
      #   run: echo "your-domain.com" > release/wwwroot/CNAME

      - name: Update base tag
        run: |
          # GitHub Pages deployment will be at https://username.github.io/repo-name/
          # We need to update the base tag in index.html
          find release/wwwroot -name "index.html" -exec sed -i 's/<base href="\/" \/>/<base href="\/AirCode\/" \/>/g' {} \;

      # Add 404.html for proper SPA routing
      - name: Add 404.html
        run: cp release/wwwroot/index.html release/wwwroot/404.html

      # Add .nojekyll file to prevent GitHub Pages from ignoring files with underscores
      - name: Add .nojekyll file
        run: touch release/wwwroot/.nojekyll

      # Create the gh-pages branch if it doesn't exist and push the build output
      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: release/wwwroot
          clean: true
