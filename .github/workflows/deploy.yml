name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]  # Change this to your default branch

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '7.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build and publish
        run: dotnet publish -c Release -o release --no-restore

      - name: Add .nojekyll file
        run: touch release/wwwroot/.nojekyll

      - name: Update service worker scope
        run: |
          # Replace service worker registration with correct scope
          REPO_NAME=$(echo "$GITHUB_REPOSITORY" | cut -d '/' -f 2)
          sed -i "s|scope: document.baseURI|scope: '/$REPO_NAME/'|g" release/wwwroot/service-worker.js

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4.4.1
        with:
          branch: gh-pages
          folder: release/wwwroot
          clean: true