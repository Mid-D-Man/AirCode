name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2

      - name: Setup .NET
        uses: actions/setup-dotnet@v1
        with:
          dotnet-version: 7.0.x

      - name: Publish .NET Project
        run: |
          dotnet restore
          dotnet build --configuration Release --no-restore
          dotnet publish AirCode.csproj -c Release -o release --nologo

      - name: Prepare for deployment
        run: |
          # Create .nojekyll file
          touch release/wwwroot/.nojekyll
          
          # Create 404.html for SPA routing
          cp release/wwwroot/index.html release/wwwroot/404.html
          
          # Update base href
          sed -i 's|<base href="/" />|<base href="/AirCode/" />|g' release/wwwroot/index.html
          sed -i 's|<base href="/" />|<base href="/AirCode/" />|g' release/wwwroot/404.html
          
          # Update service worker registration to be more robust
          sed -i 's|navigator\.serviceWorker\.register|if("serviceWorker" in navigator){window.addEventListener("load",function(){navigator.serviceWorker.register|g' release/wwwroot/index.html
          sed -i 's|register(.*);|register\1.then(function(r){console.log("SW registered")}).catch(function(e){console.error("SW error",e)});})}|g' release/wwwroot/index.html
          
          # Similar updates for 404.html
          sed -i 's|navigator\.serviceWorker\.register|if("serviceWorker" in navigator){window.addEventListener("load",function(){navigator.serviceWorker.register|g' release/wwwroot/404.html
          sed -i 's|register(.*);|register\1.then(function(r){console.log("SW registered")}).catch(function(e){console.error("SW error",e)});})}|g' release/wwwroot/404.html
          
          # Update manifest.json if needed
          if [ -f release/wwwroot/manifest.json ]; then
            sed -i 's|"start_url": "./"|"start_url": "/AirCode/"|g' release/wwwroot/manifest.json
          fi
          
          # Generate a list of deployed files for debugging
          find release/wwwroot -type f | sort > release/wwwroot/files.txt

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: release/wwwroot
          branch: gh-pages
          clean: true