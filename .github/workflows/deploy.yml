name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '7.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Publish
        run: dotnet publish -c Release -o publish

      # Skip changing base tag - we'll handle it in JavaScript instead
      # This allows us to be more dynamic about the base path

      - name: Add .nojekyll file
        run: touch publish/wwwroot/.nojekyll

      # Add this section to your GitHub workflow after the "Add .nojekyll file" step
      - name: Generate redirect script for GitHub Pages
        run: |
          cat > publish/wwwroot/redirect.js << 'EOF'
          // SPA redirect script for direct navigation to routes
          (function() {
            const isGitHubPages = window.location.hostname.includes('github.io');
            if (!isGitHubPages) return;

            const pathSegments = window.location.pathname.split('/');
            const repoName = pathSegments[1];
            const basePath = '/' + repoName + '/';

            // Check if this is a direct navigation to a route
            if (window.location.pathname !== basePath && 
                !window.location.pathname.endsWith('/index.html') && 
                !window.location.pathname.endsWith('/404.html')) {

                const routePath = window.location.pathname.substring(basePath.length - 1);
                sessionStorage.setItem('navigationPath', routePath);
                console.log('Stored navigation path for redirect:', routePath);
            }
          })();
          EOF

          # Add the redirect script to both index.html and 404.html
          sed -i '/<\/head>/i <script src="redirect.js"></script>' publish/wwwroot/index.html
          sed -i '/<\/head>/i <script src="redirect.js"></script>' publish/wwwroot/404.html

      - name: Copy index.html to 404.html
        run: cp publish/wwwroot/index.html publish/wwwroot/404.html

      # Add a preflight check script
      - name: Generate preflight check
        run: |
          cat > publish/wwwroot/preflight.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head>
            <title>AirCode Preflight Check</title>
            <style>
              body { font-family: Arial, sans-serif; margin: 2rem; }
              .success { color: green; }
              .failure { color: red; }
              table { border-collapse: collapse; margin-top: 1rem; }
              td, th { border: 1px solid #ddd; padding: 8px; }
              tr:nth-child(even) { background-color: #f2f2f2; }
            </style>
          </head>
          <body>
            <h1>AirCode Deployment Preflight Check</h1>
            <div id="results"></div>
            <script>
              const files = [
                'index.html',
                'css/app.css',
                'css/colors.css',
                '_framework/blazor.webassembly.js',
                'service-worker.js',
                'manifest.json'
              ];
          
              async function checkFiles() {
                const results = document.getElementById('results');
                const table = document.createElement('table');
          
                // Header row
                const headerRow = document.createElement('tr');
                ['File', 'Status', 'Size', 'Response Type'].forEach(text => {
                  const th = document.createElement('th');
                  th.textContent = text;
                  headerRow.appendChild(th);
                });
                table.appendChild(headerRow);
          
                // Check each file
                for (const file of files) {
                  const row = document.createElement('tr');
          
                  // File name
                  const fileCell = document.createElement('td');
                  fileCell.textContent = file;
                  row.appendChild(fileCell);
          
                  try {
                    const response = await fetch(file);
          
                    // Status
                    const statusCell = document.createElement('td');
                    if (response.ok) {
                      statusCell.textContent = '✅ ' + response.status;
                      statusCell.className = 'success';
                    } else {
                      statusCell.textContent = '❌ ' + response.status;
                      statusCell.className = 'failure';
                    }
                    row.appendChild(statusCell);
          
                    // Size
                    const sizeCell = document.createElement('td');
                    const blob = await response.blob();
                    sizeCell.textContent = (blob.size / 1024).toFixed(2) + ' KB';
                    row.appendChild(sizeCell);
          
                    // Content type
                    const typeCell = document.createElement('td');
                    typeCell.textContent = response.headers.get('content-type');
                    row.appendChild(typeCell);
          
                  } catch (error) {
                    // Error cells
                    const errorCell = document.createElement('td');
                    errorCell.textContent = '❌ Error';
                    errorCell.className = 'failure';
                    errorCell.colSpan = 3;
                    row.appendChild(errorCell);
                  }
          
                  table.appendChild(row);
                }
          
                results.appendChild(table);
          
                // Add base href info
                const baseInfo = document.createElement('div');
                baseInfo.innerHTML = `<h3>Environment</h3>
                  <p>Base Href: ${document.querySelector('base')?.href || 'Not set'}</p>
                  <p>URL: ${window.location.href}</p>
                  <p>Current Path: ${window.location.pathname}</p>
                  <p>User Agent: ${navigator.userAgent}</p>`;
                results.appendChild(baseInfo);
              }
          
              window.addEventListener('load', checkFiles);
            </script>
          </body>
          </html>
          EOF

      - name: GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: publish/wwwroot
          clean: true