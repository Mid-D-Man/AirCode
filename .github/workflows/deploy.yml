name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2

      - name: Setup .NET
        uses: actions/setup-dotnet@v1
        with:
          dotnet-version: 7.0.x

      - name: Publish .NET Project
        run: |
          dotnet restore
          dotnet build --configuration Release --no-restore
          dotnet publish AirCode.csproj -c Release -o release --nologo

      - name: Prepare for deployment
        run: |
          # Create .nojekyll file (must be empty)
          touch release/wwwroot/.nojekyll
          
          # Create 404.html for SPA routing
          cp release/wwwroot/index.html release/wwwroot/404.html
          
          # Update base href
          sed -i 's|<base href="/" />|<base href="/AirCode/" />|g' release/wwwroot/index.html
          sed -i 's|<base href="/" />|<base href="/AirCode/" />|g' release/wwwroot/404.html
          
          # Make sure the paths in the service worker are correct
          sed -i 's|const baseUrl = '\''/AirCode'\''|const baseUrl = '\'''\''|g' release/wwwroot/service-worker.js
          
          # Verify _framework folder is included in the deployment
          if [ ! -d "release/wwwroot/_framework" ]; then
            echo "ERROR: _framework folder is missing in the build output"
            exit 1
          fi
          
          # Generate a list of deployed files for debugging
          find release/wwwroot -type f | sort > release/wwwroot/files.txt

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: release/wwwroot
          branch: gh-pages
          clean: true