<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <!-- More permissive CSP for debugging -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' 'unsafe-eval' https://unpkg.com https://*.supabase.co data: blob:; connect-src 'self' https://*.supabase.co; img-src 'self' https://*.github.io data: blob:;">
    <title>AirCode</title>

    <!-- Set base href dynamically BEFORE loading any resources -->
    <script>
        // Set base href dynamically based on the current URL
        (function() {
            const ghPagesPattern = /github\.io/;
            const isGitHubPages = window.location.hostname.match(ghPagesPattern);

            let basePath;
            if (isGitHubPages) {
                // For GitHub Pages, use the repository name as the base path
                const pathParts = window.location.pathname.split('/');
                // The first segment after the leading slash is the repo name
                const repoName = pathParts[1];
                basePath = '/' + repoName + '/';
            } else {
                // For other environments, use root
                basePath = '/';
            }

            document.write('<base href="' + basePath + '" />');
            console.log('Dynamic base path set to:', basePath);

            // Store base path for service worker and other scripts
            window.BASE_PATH = basePath;

            // Save path info to session storage to maintain state across 404 redirects
            const currentPath = window.location.pathname;
            if (isGitHubPages && currentPath !== basePath && !currentPath.endsWith('/index.html') && !currentPath.endsWith('/404.html')) {
                // We may be hitting a client-side route directly - store the path
                const relativePath = currentPath.substring(basePath.length - 1);
                sessionStorage.setItem('navigationPath', relativePath);
                console.log('Stored navigation path:', relativePath);
            }
        })();
    </script>

    <!-- App stylesheets loaded AFTER base tag is set -->
    <link href="css/bootstrap/bootstrap.min.css" rel="stylesheet" />
    <link href="css/app.css" rel="stylesheet" />
    <link href="css/colors.css" rel="stylesheet" />
    <link href="css/responsive.css" rel="stylesheet" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="manifest.json" rel="manifest" />
    <link rel="apple-touch-icon" sizes="512x512" href="icon-512.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="icon-192.png" />
</head>

<body>
<!-- Improved custom splash screen with spinner -->
<div id="custom-splash" class="splash-screen">
    <img src="favicon.png" alt="AirCode Logo" />
    <h1>AirCode</h1>
    <p>Loading application...</p>
    <div class="spinner-container">
        <div class="spinner"></div>
    </div>
    <div class="loading-progress-percentage">0%</div>
</div>

<div id="app">
    <!-- This will be replaced by Blazor -->
</div>

<div id="blazor-error-ui" style="display: none;">
    An unhandled error has occurred.
    <a href="" class="reload">Reload</a>
    <a class="dismiss">🗙</a>
</div>

<!-- Load debug script first -->
<script src="js/debug.js"></script>

<!-- Improved splash screen loading -->
<script>
    // Set initial loading progress 
    let loadingProgress = 0;
    let progressIntervalActive = true;

    const progressInterval = setInterval(() => {
        if (!progressIntervalActive) {
            clearInterval(progressInterval);
            return;
        }

        if (loadingProgress < 90) {
            loadingProgress += Math.floor(Math.random() * 5) + 1; // Random progress for more natural feel
            if (loadingProgress > 90) loadingProgress = 90;
            updateLoadingProgress(loadingProgress);
        }
    }, 300);

    function updateLoadingProgress(percentage) {
        const percentageDisplay = document.querySelector('#custom-splash .loading-progress-percentage');

        if (percentageDisplay) {
            percentageDisplay.textContent = percentage + '%';
        }
    }

    // Function to hide custom splash screen when Blazor is ready
    window.hideSplashScreen = function() {
        progressIntervalActive = false;
        clearInterval(progressInterval);
        updateLoadingProgress(100);

        setTimeout(() => {
            let splash = document.getElementById('custom-splash');
            if (splash) {
                splash.style.opacity = '0';
                setTimeout(function() {
                    splash.style.display = 'none';
                }, 300);
            }

            // Check if we need to navigate to a stored route after Blazor is initialized
            setTimeout(() => {
                const storedPath = sessionStorage.getItem('navigationPath');
                if (storedPath && window.Blazor) {
                    console.log('Navigating to stored path:', storedPath);
                    sessionStorage.removeItem('navigationPath');
                    // Use Blazor navigation
                    window.Blazor.navigateTo(storedPath);
                }
            }, 500);
        }, 500);
    };
</script>

<!-- Load Blazor -->
<script src="_framework/blazor.webassembly.js" onerror="document.getElementById('blazor-error-ui').style.display = 'block'"></script>

<!-- External libraries -->
<script src="https://unpkg.com/@zxing/library@0.18.6/umd/index.min.js"></script>

<!-- App scripts -->
<script src="js/connectivityServices.js"></script>
<script src="js/themeSwitcher.js"></script>

<!-- Route handling for GitHub Pages -->
<script>
    // Handle GitHub Pages SPA routing
    window.handleGitHubPagesRouting = function() {
        const baseElement = document.querySelector('base');
        if (!baseElement) return;

        // Get base path
        const basePath = baseElement.getAttribute('href');

        // Check if we need to handle a redirect from 404.html
        const redirectPath = sessionStorage.getItem('navigationPath');
        if (redirectPath) {
            console.log('Redirecting to stored path:', redirectPath);
            sessionStorage.removeItem('navigationPath');
            // Wait for Blazor to initialize
            const waitForBlazor = setInterval(() => {
                if (window.Blazor && window.Blazor.navigateTo) {
                    clearInterval(waitForBlazor);
                    window.Blazor.navigateTo(redirectPath);
                }
            }, 100);
        }

        // Add click handler to all internal links
        document.addEventListener('click', function(event) {
            // Only handle left clicks on anchor tags
            if (event.button !== 0 || !event.target.closest('a')) return;

            const link = event.target.closest('a');
            const href = link.getAttribute('href');

            // Skip external links, anchor links, or links with download attribute
            if (!href ||
                href.startsWith('http') ||
                href.startsWith('#') ||
                href.startsWith('mailto:') ||
                href.startsWith('tel:') ||
                link.hasAttribute('download') ||
                link.hasAttribute('target')) {
                return;
            }

            // Prevent default link behavior
            event.preventDefault();

            // Let Blazor handle the routing
            if (window.Blazor && window.Blazor.navigateTo) {
                console.log('Using Blazor navigation for:', href);
                window.Blazor.navigateTo(href);
            }
        });
    };

    // Register service worker when page has loaded
    window.addEventListener('load', function() {
        if ('serviceWorker' in navigator) {
            const swUrl = new URL('service-worker.js', document.baseURI).href;

            navigator.serviceWorker.register(swUrl, {
                scope: document.baseURI
            })
                .then(function(registration) {
                    console.log('ServiceWorker registration successful with scope: ', registration.scope);
                })
                .catch(function(error) {
                    console.log('ServiceWorker registration failed: ', error);
                });
        }

        // Setup GitHub Pages routing
        if (window.location.hostname.includes('github.io')) {
            console.log('Setting up GitHub Pages routing');
            window.handleGitHubPagesRouting();
        }

        // Simplified Blazor loading detection
        const checkBlazorStarted = () => {
            if (window.Blazor) {
                // For newer versions that support addEventListener
                if (typeof window.Blazor.addEventListener === 'function') {
                    window.Blazor.addEventListener('afterStarted', hideSplashScreen);
                } else {
                    // For older versions, use MutationObserver
                    const observer = new MutationObserver((mutations) => {
                        if (document.querySelector('#app > *')) {
                            hideSplashScreen();
                            observer.disconnect();
                        }
                    });

                    observer.observe(document.getElementById('app'), {
                        childList: true,
                        subtree: true
                    });

                    // Safety fallback
                    setTimeout(hideSplashScreen, 5000);
                }
            } else {
                // Retry if Blazor hasn't loaded yet
                setTimeout(checkBlazorStarted, 100);
            }
        };

        // Start checking if Blazor has started
        checkBlazorStarted();

        // Ultimate safety fallback
        setTimeout(hideSplashScreen, 10000);
    });
</script>
<script>
    // Improved SPA routing handler for GitHub Pages
    (function() {
        // Only run this for GitHub Pages
        if (!window.location.hostname.includes('github.io')) return;

        // Get repository name for base path
        const pathSegments = window.location.pathname.split('/');
        const repoName = pathSegments[1];
        const basePath = '/' + repoName + '/';

        // Check if we're hitting a 404
        if (document.title.includes('404') ||
            document.body.textContent.includes('404') ||
            (document.querySelector('meta[name="description"]') &&
                document.querySelector('meta[name="description"]').content.includes('404'))) {

            console.log('Detected 404 page, attempting SPA redirection');

            // Extract the relative path
            const fullPath = window.location.pathname;
            const relativePath = fullPath.substring(basePath.length - 1);

            // Store in session storage for the app to handle after redirect
            sessionStorage.setItem('navigationPath', relativePath);
            window.location.href = basePath;
            return;
        }

        // Client-side routing fix: intercept all internal clicks
        document.addEventListener('click', function(event) {
            // Only handle left clicks on anchor tags
            const link = event.target.closest('a');
            if (!link || event.button !== 0) return;

            const href = link.getAttribute('href');

            // Skip external links, anchor links, etc.
            if (!href ||
                href.startsWith('http') ||
                href.startsWith('#') ||
                href.startsWith('mailto:') ||
                href.startsWith('tel:') ||
                link.hasAttribute('download') ||
                link.getAttribute('target') === '_blank') {
                return;
            }

            // Handle internal navigation
            event.preventDefault();

            if (window.Blazor && window.Blazor.navigateTo) {
                console.log('Using Blazor navigation for:', href);
                window.Blazor.navigateTo(href);
            }
        });

        // Handle browser history navigation
        window.addEventListener('popstate', function(event) {
            console.log('Popstate event detected');
            // Let Blazor handle it - it should already do this correctly
        });

        // Check for stored navigation path at app startup
        window.addEventListener('DOMContentLoaded', function() {
            const navigationPath = sessionStorage.getItem('navigationPath');
            if (navigationPath) {
                console.log('Found stored navigation path:', navigationPath);
                // We'll handle this once Blazor is fully loaded
            }
        });

        // Function to check for Blazor and navigate if needed
        function checkBlazorAndNavigate() {
            const navigationPath = sessionStorage.getItem('navigationPath');
            if (navigationPath && window.Blazor && window.Blazor.navigateTo) {
                console.log('Navigating to stored path:', navigationPath);
                sessionStorage.removeItem('navigationPath');
                window.Blazor.navigateTo(navigationPath);
                return true;
            }
            return false;
        }

        // Start checking after a delay to let Blazor initialize
        setTimeout(function checkInterval() {
            if (!checkBlazorAndNavigate()) {
                // If not successful, check again in 100ms (up to 50 times = 5 seconds)
                if (window._navCheckCount === undefined) window._navCheckCount = 0;
                if (window._navCheckCount++ < 50) {
                    setTimeout(checkInterval, 100);
                }
            }
        }, 500);
    })();
</script>
</body>
</html>
