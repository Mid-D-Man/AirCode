<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Redirecting...</title>
    <script>
        // Store the actual path (everything after the repo name) in session storage
        (function() {
            const ghPagesPattern = /github\.io/;
            const isGitHubPages = window.location.hostname.match(ghPagesPattern);

            if (isGitHubPages) {
                const pathParts = window.location.pathname.split('/');
                const repoName = pathParts[1];

                // Calculate the part of the path after the repo name
                const basePath = '/' + repoName + '/';
                let relativePath = window.location.pathname;

                if (relativePath.startsWith(basePath)) {
                    relativePath = relativePath.substring(basePath.length - 1);
                }

                // Store the path and redirect to the base path
                sessionStorage.setItem('navigationPath', relativePath);
                console.log('Stored navigation path:', relativePath);

                // Redirect to the root of the GitHub Pages site
                window.location.href = basePath;
            }
        })();
    </script>
</head>
<body>
Redirecting...
</body>
</html>
