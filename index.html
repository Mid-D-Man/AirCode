<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <!-- Completely updated CSP meta tag -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://unpkg.com; style-src 'self' 'unsafe-inline'; img-src 'self' https: data:; connect-src 'self' https://*.supabase.co; font-src 'self'; frame-src 'self';">
    <title>AirCode</title>
    <base href="/AirCode/" />
    <link href="css/bootstrap/bootstrap.min.css" rel="stylesheet" />
    <link href="css/app.css" rel="stylesheet" />
    <!-- Define favicon with absolute path -->
    <link rel="icon" type="image/png" href="/AirCode/icons/favicon.png" />
    <!-- Add a fallback favicon that browsers sometimes request by default -->
    <link rel="shortcut icon" href="/AirCode/icons/favicon.png" />
    <link href="AirCode.styles.css" rel="stylesheet" />
    <link href="manifest.json" rel="manifest" />

    <link rel="stylesheet" href="css/colors.css" />
    <link rel="stylesheet" href="css/responsive.css" />

    <link rel="apple-touch-icon" sizes="512x512" href="icons/icon-512.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="icons/icon-192.png" />

    <script type="text/javascript">
        // Single Page Apps for GitHub Pages
        // MIT License
        // https://github.com/rafgraph/spa-github-pages
        (function(l) {
            if (l.search[1] === '/' ) {
                var decoded = l.search.slice(1).split('&').map(function(s) {
                    return s.replace(/~and~/g, '&')
                }).join('?');
                window.history.replaceState(null, null,
                    l.pathname.slice(0, -1) + decoded + l.hash
                );
            }
        }(window.location))
    </script>
</head>

<body>
<div id="app">
    <svg class="loading-progress">
        <circle r="40%" cx="50%" cy="50%" />
        <circle r="40%" cx="50%" cy="50%" />
    </svg>
    <div class="loading-progress-text"></div>
</div>

<div id="blazor-error-ui">
    An unhandled error has occurred.
    <a href="" class="reload">Reload</a>
    <a class="dismiss">🗙</a>
</div>
<script src="_framework/blazor.webassembly.js"></script>
<script>navigator.serviceWorker.register('service-worker.js', { scope: '/AirCode/' });</script>
<script src="https://unpkg.com/@zxing/library@0.18.6/umd/index.min.js"></script>
<script src="js/connectivityServices.js"></script>
<script src="js/themeSwitcher.js"></script>

</body>

</html>
